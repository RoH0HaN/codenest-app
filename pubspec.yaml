name: codenest
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  get: ^4.7.2
  get_storage: ^2.1.1
  flutter_svg: ^2.1.0
  skeletonizer: ^1.4.3
  animated_text_kit: ^4.2.3
  dotted_border: ^2.1.0
  image_picker: ^1.1.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/afacad/
    - assets/fonts/kalam/

  fonts:
    - family: Afacad
      fonts:
        - asset: assets/fonts/afacad/Afacad-Regular.ttf
          weight: 400
        - asset: assets/fonts/afacad/Afacad-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/afacad/Afacad-Bold.ttf
          weight: 700
    - family: Kalam
      fonts:
        - asset: assets/fonts/kalam/Kalam-Regular.ttf
          weight: 400
        - asset: assets/fonts/kalam/Kalam-Bold.ttf
          weight: 700
